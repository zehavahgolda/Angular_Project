<div class="store-locator-container">
  <div class="header-banner">
    <h1>מצאו את סניפי פנדורה לפי אזור</h1>
  </div>

  <div class="locator-layout">
    <aside class="sidebar">
      <div class="sidebar-title">סניפים</div>
      <ul class="store-list">
        <li *ngFor="let store of stores" class="store-item">
          <a [href]="store.link" target="_blank" class="store-link">
            <span class="store-name">{{ store.city }} - {{ store.branch }}</span>
            <i class="pi pi-chevron-left"></i>
          </a>
        </li>
      </ul>
    </aside>

    <section class="map-area">
      <iframe 
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3381.123!2d34.792!3d32.074!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMzLCsDA0JzI2LjQiTiAzNMKwNDcnMzEuMiJF!5e0!3m2!1siw!2sil!4v1234567890" 
        width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy">
      </iframe>
    </section>
  </div>

  <div class="footer-info-text">
    <h3>מצאו את הסניף הקרוב אליכם של פנדורה</h3>
    <p>פנדורה היא מותג תכשיטים בינלאומי המוכר בזכות הצ'ארמס והצמידים האייקוניים שלו...</p>
  </div>
</div>
